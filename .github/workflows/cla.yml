name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  # 'write' REQUIS : contributor-assistant stocke les signatures dans une branche
  # DU dépôt (`release/cla-signatures`, cf. `branch:` ci-dessous) — il doit pouvoir la
  # créer/committer. Avec 'read', le bot échoue ("Resource not accessible by integration")
  # et ne peut enregistrer AUCUNE signature. La branche de signatures ne doit pas être protégée.
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA — signature requise"
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/1Batmain/Agora/blob/main/CLA.md'
          branch: 'release/cla-signatures'
          allowlist: 1Batmain,dependabot[bot]
          custom-notsigned-prcomment: >
            Merci pour ta contribution 🙏 Avant de merger, tu dois accepter le
            [CLA d'Agora](https://github.com/1Batmain/Agora/blob/main/CLA.md) —
            il permet de financer l'édition civique **gratuite** par une édition commerciale,
            **tu gardes tous tes droits**. Pour signer, commente exactement :
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: '✅ Tous les contributeurs ont signé le CLA.'
