name: CI
# Gate des PR vers main : les tests backend + le build front doivent passer avant merge.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: pytest (unitaires + intégration, skip gracieux sans cache)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          AGORA_CLAIMS_BACKEND=api uv run --extra contender --extra embed-contender --extra faiss \
            --with fastapi --with pytest --with httpx \
            pytest backend/tests -p no:warnings

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
