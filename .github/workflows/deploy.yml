name: Deploy
# Auto-déploiement quand `main` change (après merge d'une PR validée).
# La procédure de déploiement (pull + build + restart) est tenue HORS du repo,
# côté machine, et invoquée ci-dessous — le repo public ne décrit pas l'infra.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, agora-vps]
    steps:
      - name: Déploiement (procédure hors-repo)
        run: "$HOME/infra/deploy/deploy.sh"
        env:
          AGORA_API_TOKEN: ${{ secrets.AGORA_API_TOKEN }}
          AGORA_HASH_SALT: ${{ secrets.AGORA_HASH_SALT }}
